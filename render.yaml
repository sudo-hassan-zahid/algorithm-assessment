databases:
  - name: relay-db
    plan: free
    postgresMajorVersion: "17"

services:
  - type: web
    name: relay-support-console
    runtime: node
    plan: free
    buildCommand: npm ci && npm run db:migrate && npm run db:seed && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: relay-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: openai/gpt-oss-20b
