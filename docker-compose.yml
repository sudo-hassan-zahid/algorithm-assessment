services:
  app:
    build: .
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/support_ops
      GROQ_API_KEY: ${GROQ_API_KEY:?Add GROQ_API_KEY to .env before starting}
      GROQ_MODEL: ${GROQ_MODEL:-openai/gpt-oss-20b}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: support_ops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d support_ops"]
      interval: 2s
      timeout: 5s
      retries: 10
    volumes:
      - support_ops_data:/var/lib/postgresql/data

volumes:
  support_ops_data:
