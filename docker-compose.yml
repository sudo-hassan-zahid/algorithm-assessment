services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: support_ops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d support_ops"]
      interval: 2s
      timeout: 5s
      retries: 10
    volumes:
      - support_ops_data:/var/lib/postgresql/data

volumes:
  support_ops_data:

